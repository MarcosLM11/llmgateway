spring:
  application:
    name: llmgateway

logging:
  pattern:
    level: "%5p [%X{requestId:-}] [%X{tenantId:-}]"

gateway:
  security:
    api-keys:
      - key: sk-test-alice
        tenant-id: alice-corp
      - key: sk-test-bob
        tenant-id: bob-startup
  providers:
    ollama:
      base-url: http://localhost:11434
    mock:
      enabled: true
      supported-models: mock-fast,mock-slow,qwen2.5-coder:7b
      fail-rate: 0.0
      latency-ms: 5000

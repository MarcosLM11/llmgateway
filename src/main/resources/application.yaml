spring:
  application:
    name: llmgateway
  datasource:
    url: jdbc:postgresql://localhost:5432/llmgateway
    username: llmgateway
    password: llmgateway
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    ollama:
      base-url: ${SPRING_AI_OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        enabled: false # importante: no quieres el chat de Spring AI
      embedding:
        enabled: true
        options:
          model: nomic-embed-text
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      acks: all
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: llmgateway-metering
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.value.default.type: com.marcos.llmgateway.metering.UsageEvent
        spring.json.use.type.headers: false
      listener:
        ack-mode: manual

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        llmgateway.provider.latency: true
        llmgateway.embedding.latency: true
  tracing:
    enabled: true
    sampling:
        probability: 1.0
    baggage:
      correlation:
        enabled: true
        fields:
          - traceId
          - spanId
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
    logging:
      export:
        otlp:
          endpoint: http://localhost:3100/otlp/v1/logs
    instrumentation:
      logback-appender:
        capture-experimental-attributes: true
        capture-key-value-pair-attributes: true

logging:
  pattern:
    level: "%5p [%X{requestId:-}] [%X{tenantId:-}] [%X{traceId:-},%X{spanId:-}]"

gateway:
  cache:
    similarity-threshold: 0.15
  rate-limit:
    enabled: true
    capacity: 10
    refill-tokens: 10
    refill-period-seconds: 60
  security:
    api-keys:
      - key: sk-test-alice
        tenant-id: alice-corp
      - key: sk-test-bob
        tenant-id: bob-startup
      - key: sk-admin-master
        tenant: admin
        admin: true
  providers:
    ollama:
      base-url: http://localhost:11434
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: https://api.openai.com
    mock:
      enabled: true
      supported-models: mock-fast,mock-slow
      fail-rate: 0.0
      latency-ms: 0

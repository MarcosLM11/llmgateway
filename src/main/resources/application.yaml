spring:
  application:
    name: llmgateway
  datasource:
    url: jdbc:postgresql://localhost:5432/llmgateway
    username: llmgateway
    password: llmgateway
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    ollama:
      base-url: ${SPRING_AI_OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        enabled: false # importante: no quieres el chat de Spring AI
      embedding:
        enabled: true
        options:
          model: nomic-embed-text

logging:
  pattern:
    level: "%5p [%X{requestId:-}] [%X{tenantId:-}]"
  level:
    org.flywaydb: INFO
    org.springframework.boot.autoconfigure.flyway: DEBUG

gateway:
  rate-limit:
    enabled: true
    capacity: 10
    refill-tokens: 10
    refill-period-seconds: 60
  security:
    api-keys:
      - key: sk-test-alice
        tenant-id: alice-corp
      - key: sk-test-bob
        tenant-id: bob-startup
  providers:
    ollama:
      base-url: http://localhost:11434
    mock:
      enabled: true
      supported-models: mock-fast,mock-slow
      fail-rate: 0.0
      latency-ms: 0
